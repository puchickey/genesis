<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worry Time</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ==================== PAGE 1: DOOR ==================== -->
  <div id="page-door" class="page active">
    <div class="door-screen">
      <h1 class="app-title">Worry Time</h1>

      <div id="door-container">
        <div id="door-frame">
          <div id="door" class="closed">
            <div id="door-handle"></div>
          </div>
          <div id="door-glow"></div>
        </div>
      </div>

      <div id="countdown-label"></div>
      <div id="countdown-time">--:--:--</div>
      <div id="schedule-label"></div>

      <button id="btn-settings" class="btn-icon" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- ==================== PAGE 2: TOPIC VIEW ==================== -->
  <div id="page-memo" class="page">
    <div class="memo-layout">
      <!-- Sidebar -->
      <aside id="sidebar">
        <header>
          <button id="btn-back" class="btn-icon" aria-label="Back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5" />
              <path d="m12 19-7-7 7-7" />
            </svg>
          </button>
          <button id="btn-new-topic" class="btn-new-topic" aria-label="New Topic">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
        </header>
        <nav id="session-list">
          <!-- Dynamically filled -->
        </nav>
      </aside>

      <!-- Main Content -->
      <main id="memo-main">
        <header id="memo-header">
          <span id="memo-title" contenteditable="true" spellcheck="false"></span>
          <button id="btn-delete-topic" class="btn-icon btn-icon-small" aria-label="Delete topic">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18" />
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
            </svg>
          </button>
        </header>

        <!-- Message List (with date dividers) -->
        <section id="memo-items">
          <!-- Dynamically filled -->
        </section>

        <!-- Input -->
        <div id="write-area">
          <div id="write-box">
            <textarea id="free-write" rows="2" placeholder="..."></textarea>
            <button id="btn-send" class="btn-send" aria-label="Send">↑</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- ==================== SETTINGS MODAL ==================== -->
  <dialog id="settings-dialog">
    <article>
      <header>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
        Settings
      </header>
      <div class="setting-row">
        <label>Start</label>
        <input type="number" id="set-hour" min="0" max="23" value="21">
        <span>:</span>
        <input type="number" id="set-minute" min="0" max="59" value="0" step="5">
      </div>
      <div class="setting-row">
        <label>Duration</label>
        <input type="number" id="set-duration" min="5" max="60" value="20" step="5">
        <span>min</span>
      </div>
      <footer>
        <button id="btn-settings-cancel" class="secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
        <button id="btn-settings-save">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </button>
      </footer>
    </article>
  </dialog>

  <script src="app.js"></script>
</body>

</html>
